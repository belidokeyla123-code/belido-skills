[Unit]
Description={{service_name}} - Advocacia Belido
After=network.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory={{app_dir}}
ExecStart={{command}}
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier={{service_name}}

# Resource limits
MemoryMax=512M
CPUQuota=80%

[Install]
WantedBy=multi-user.target
